<!DOCTYPE html>
<html>
<head>
    <title>Store Products</title>
</head>
<body>

<h2>Products in {{ store.name }}</h2>

<p>
    <a href="{% url 'products:add_product' store.id %}">
        Add Product
    </a>
</p>

<ul>
{% for product in products %}
    <li>
        <strong>{{ product.name }}</strong>
        - ${{ product.price }}

        <a href="{% url 'products:edit_product' product.id %}">
            Edit
        </a>

        <a href="{% url 'products:delete_product' product.id %}">
            Delete
        </a>
    </li>
{% empty %}
    <li>No products yet.</li>
{% endfor %}
</ul>

<p>
    <a href="{% url 'store_list' %}">
        Back to Stores
    </a>
</p>

</body>
</html>
