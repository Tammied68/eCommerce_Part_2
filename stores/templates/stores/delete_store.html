<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delete Store</title>
</head>
<body>

    <h1>Delete Store</h1>

    <p>
        Are you sure you want to delete
        "<strong>{{ store.name }}</strong>"?
    </p>

    <form method="post">
        {% csrf_token %}

        <button type="submit">Yes, Delete Store</button>
    </form>

    <br>

    <a href="{% url 'store_list' %}">Cancel</a>

</body>
</html>
