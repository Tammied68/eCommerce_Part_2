<!DOCTYPE html>
<html>
<head>
    <title>Password Reset</title>
</head>
<body>
    <h2>Reset Password</h2>

    <p>Enter the email address linked to your account.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send Password Reset Email</button>
    </form>

    <p>
        <a href="{% url 'login' %}">Back to Login</a>
    </p>
</body>
</html>
